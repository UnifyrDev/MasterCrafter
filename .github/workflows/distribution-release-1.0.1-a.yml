name: Distribution Release 1.0.1-a

on:
  workflow_dispatch:
  push:
    tags:
      - "v1.0.1-a"

permissions:
  contents: write

concurrency:
  group: distribution-release-1.0.1-a
  cancel-in-progress: true

env:
  ELECTRON_CACHE: ${{ github.workspace }}/.electron-cache
  ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.electron-builder-cache

jobs:
  validate:
    runs-on: ubuntu-22.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

  prepare-version:
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.version.outputs.version }}
      displayVersion: ${{ steps.version.outputs.displayVersion }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Read version metadata
        id: version
        run: node ./scripts/packaging/version-info.mjs

      - name: Validate tag version
        if: github.event_name == 'push'
        env:
          TAG_NAME: ${{ github.ref_name }}
          EXPECTED_TAG: v${{ steps.version.outputs.version }}
        run: |
          if [ "$TAG_NAME" != "$EXPECTED_TAG" ]; then
            echo "Tag $TAG_NAME does not match expected $EXPECTED_TAG"
            exit 1
          fi

  build-windows:
    needs:
      - validate
      - prepare-version
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        run: node ./scripts/package.mjs win

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer-${{ needs.prepare-version.outputs.displayVersion }}
          path: |
            release/*.exe
            release/*.exe.blockmap
            release/latest*.yml
          if-no-files-found: error
          retention-days: 14

  build-linux:
    needs:
      - validate
      - prepare-version
    runs-on: ubuntu-22.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install Linux packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fakeroot rpm

      - name: Install dependencies
        run: npm ci

      - name: Build Debian and RPM packages
        run: node ./scripts/package.mjs linux deb rpm

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages-${{ needs.prepare-version.outputs.displayVersion }}
          path: |
            release/*.deb
            release/*.rpm
            release/latest*.yml
          if-no-files-found: error
          retention-days: 14

  release:
    needs:
      - prepare-version
      - build-windows
      - build-linux
    runs-on: ubuntu-22.04
    steps:
      - name: Resolve release metadata
        id: release
        shell: bash
        env:
          PACKAGE_VERSION: ${{ needs.prepare-version.outputs.version }}
          DISPLAY_VERSION: ${{ needs.prepare-version.outputs.displayVersion }}
        run: |
          if [ "$GITHUB_EVENT_NAME" = "push" ]; then
            echo "tag_name=v${PACKAGE_VERSION}" >> "$GITHUB_OUTPUT"
            echo "release_name=MasterCrafter v${DISPLAY_VERSION}" >> "$GITHUB_OUTPUT"
            echo "overwrite_files=true" >> "$GITHUB_OUTPUT"
          else
            echo "tag_name=v${PACKAGE_VERSION}-rc.${GITHUB_RUN_ID}.${GITHUB_RUN_ATTEMPT}" >> "$GITHUB_OUTPUT"
            echo "release_name=MasterCrafter RC v${DISPLAY_VERSION}" >> "$GITHUB_OUTPUT"
            echo "overwrite_files=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-installer-${{ needs.prepare-version.outputs.displayVersion }}
          path: release-artifacts/windows

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-packages-${{ needs.prepare-version.outputs.displayVersion }}
          path: release-artifacts/linux

      - name: Package release bundles
        shell: bash
        env:
          DISPLAY_VERSION: ${{ needs.prepare-version.outputs.displayVersion }}
        run: |
          set -euo pipefail
          python3 <<'PY'
          from pathlib import Path
          from zipfile import ZIP_DEFLATED, ZipFile
          import os

          display_version = os.environ["DISPLAY_VERSION"]
          root = Path("release-artifacts")
          publish = root / "publish"
          windows_dir = root / "windows"
          linux_dir = root / "linux"
          publish.mkdir(parents=True, exist_ok=True)

          def collect(base_dir, *patterns):
            files = []
            seen = set()
            for pattern in patterns:
              for file in sorted(base_dir.glob(pattern)):
                if file.is_file() and file not in seen:
                  seen.add(file)
                  files.append(file)
            return files

          def create_bundle(bundle_name, files):
            if not files:
              raise SystemExit(f"No files found for {bundle_name}")

            with ZipFile(publish / bundle_name, "w", compression=ZIP_DEFLATED) as archive:
              for file in files:
                archive.write(file, arcname=file.name)

          windows_files = collect(windows_dir, "*.exe", "*.exe.blockmap", "latest*.yml")
          create_bundle(f"MasterCrafter-Windows-{display_version}.zip", windows_files)

          linux_metadata = collect(linux_dir, "latest*.yml")
          deb_files = collect(linux_dir, "*.deb") + linux_metadata
          rpm_files = collect(linux_dir, "*.rpm") + linux_metadata
          create_bundle(f"MasterCrafter-Deb-{display_version}.zip", deb_files)
          create_bundle(f"MasterCrafter-Rpm-{display_version}.zip", rpm_files)
          PY

      - name: Publish GitHub prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag_name }}
          target_commitish: ${{ github.sha }}
          name: ${{ steps.release.outputs.release_name }}
          overwrite_files: ${{ steps.release.outputs.overwrite_files }}
          preserve_order: true
          working_directory: release-artifacts/publish
          files: |
            *.zip
          fail_on_unmatched_files: true
          generate_release_notes: true
          prerelease: true
          draft: false
