name: Distribution Release 1.0.1-a

on:
  workflow_dispatch:
  push:
    tags:
      - "v1.0.1-a"

permissions:
  contents: write

concurrency:
  group: distribution-release-1.0.1-a
  cancel-in-progress: true

env:
  ELECTRON_CACHE: ${{ github.workspace }}/.electron-cache
  ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.electron-builder-cache

jobs:
  validate:
    runs-on: ubuntu-22.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

  prepare-version:
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.version.outputs.version }}
      displayVersion: ${{ steps.version.outputs.displayVersion }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Read version metadata
        id: version
        run: node ./scripts/packaging/version-info.mjs

      - name: Validate tag version
        if: github.event_name == 'push'
        env:
          TAG_NAME: ${{ github.ref_name }}
          EXPECTED_TAG: v${{ steps.version.outputs.version }}
        run: |
          if [ "$TAG_NAME" != "$EXPECTED_TAG" ]; then
            echo "Tag $TAG_NAME does not match expected $EXPECTED_TAG"
            exit 1
          fi

  build-windows:
    needs:
      - validate
      - prepare-version
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        run: node ./scripts/package.mjs win

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer-${{ needs.prepare-version.outputs.displayVersion }}
          path: release/*
          if-no-files-found: error
          retention-days: 14

  build-linux:
    needs:
      - validate
      - prepare-version
    runs-on: ubuntu-22.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install Linux packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fakeroot rpm

      - name: Install dependencies
        run: npm ci

      - name: Build Debian and RPM packages
        run: node ./scripts/package.mjs linux deb rpm

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages-${{ needs.prepare-version.outputs.displayVersion }}
          path: release/*
          if-no-files-found: error
          retention-days: 14

  release:
    needs:
      - prepare-version
      - build-windows
      - build-linux
    runs-on: ubuntu-22.04
    steps:
      - name: Resolve release metadata
        id: release
        shell: bash
        env:
          PACKAGE_VERSION: ${{ needs.prepare-version.outputs.version }}
          DISPLAY_VERSION: ${{ needs.prepare-version.outputs.displayVersion }}
        run: |
          if [ "$GITHUB_EVENT_NAME" = "push" ]; then
            echo "tag_name=v${PACKAGE_VERSION}" >> "$GITHUB_OUTPUT"
            echo "release_name=MasterCrafter v${DISPLAY_VERSION}" >> "$GITHUB_OUTPUT"
            echo "overwrite_files=true" >> "$GITHUB_OUTPUT"
          else
            echo "tag_name=v${PACKAGE_VERSION}-rc.${GITHUB_RUN_ID}.${GITHUB_RUN_ATTEMPT}" >> "$GITHUB_OUTPUT"
            echo "release_name=MasterCrafter RC v${DISPLAY_VERSION}" >> "$GITHUB_OUTPUT"
            echo "overwrite_files=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-installer-${{ needs.prepare-version.outputs.displayVersion }}
          path: release-artifacts/windows

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-packages-${{ needs.prepare-version.outputs.displayVersion }}
          path: release-artifacts/linux

      - name: Stage release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-artifacts/publish
          shopt -s nullglob

          assets=(
            release-artifacts/windows/*.exe
            release-artifacts/windows/*.exe.blockmap
            release-artifacts/windows/latest.yml
            release-artifacts/linux/*.deb
            release-artifacts/linux/*.rpm
          )

          if [ "${#assets[@]}" -eq 0 ]; then
            echo "No release assets were staged."
            exit 1
          fi

          cp -- "${assets[@]}" release-artifacts/publish/

      - name: Publish GitHub prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag_name }}
          target_commitish: ${{ github.sha }}
          name: ${{ steps.release.outputs.release_name }}
          overwrite_files: ${{ steps.release.outputs.overwrite_files }}
          preserve_order: true
          files: |
            release-artifacts/publish/*
          generate_release_notes: true
          prerelease: true
          draft: false
